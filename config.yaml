llm:
  base_url: http://localhost:1234/v1
  model: qwen/qwen3.5-9b
  embed_model: text-embedding-nomic-embed-text-v2-moe
paths:
  raw: data/raw
  work: data/work
  noisy: data/noisy
  ground_truth: data/ground_truth
extract:
  # 700 (was 1800): smaller chunks force the model to process each portion of a
  # dense conversation and close the facts array naturally, avoiding the greedy
  # repetition loop a large chunk triggers (it would fixate on early facts and
  # duplicate them to the token cap). Pairs with EXTRACT_SCHEMA maxItems=15.
  chunk_tokens: 700
  overlap_tokens: 200
  confidence_threshold: 0.6
eval:
  snr_levels: [20, 15, 10, 5, 0]
  source_clip: pms
  slice_start_s: 0
  slice_end_s: 160
  noise_path: noices/cafe_16k.wav
  clip_prefix: pmsslice
  degraded_snr: 5
  spotcheck_questions:
    - "How does a PMS differ from a mutual fund?"
    - "What is the minimum investment for a PMS?"
    - "Who is a PMS suitable for?"
limits:
  max_minutes: 15
